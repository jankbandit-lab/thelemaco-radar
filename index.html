<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>THELÉMACO · RADAR DE MERCADO</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#05070b; --bg2:#0a0e15; --panel:#0e131c; --line:#1c2433; --txt:#e2e9f4;
      --sys:#00e6c3; --sys-2:#ff2ec4; --gold:#cBA45A; --faint:#475066;
      --r:14px; --bot:46px; --mono:'JetBrains Mono',monospace; --disp:'Space Grotesk',sans-serif;
    }
    
    /* 1. FONDO MATEMÁTICO (Fórmulas sutiles) */
    body::before {
      content: "∑ ∫ ∂π lim x→∞ Δy/Δx = f'(x) √x² = |x| log(e) = 1";
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; color: var(--txt); opacity: 0.04; font-family: serif;
      font-size: 24px; line-height: 120px; padding: 20px;
      pointer-events: none; word-break: break-all;
    }

    /* 2. RESALTE DE MARCOS DE NOTICIAS */
    .card {
      border: 1px solid var(--line);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card:hover {
      border-color: var(--sys);
      box-shadow: 0 10px 30px rgba(0, 230, 195, 0.25), 0 0 10px rgba(0, 230, 195, 0.1);
      transform: translateY(-8px);
    }

    /* 3. ESTILO CABECERA DINÁMICA */
    .topband { 
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 22px; border-bottom: 1px solid var(--line);
    }
    .intel-container {
      display: flex; align-items: center; gap: 12px;
      background: rgba(14, 19, 28, 0.8); padding: 5px 15px; 
      border-radius: 8px; border: 1px solid var(--line); max-width: 400px;
    }
    .intel-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--sys); }
    .intel-text { font-family: var(--mono); font-size: 10px; color: var(--txt); line-height: 1.2; }

    /* Estilos base */
    body { margin:0; background:var(--bg); color:var(--txt); font-family:var(--disp); }
  </style>
</head>
<body>

  <div class="topband">
    <div class="brandwrap">
      <img class="logo-img" src="logo.png" style="height: 50px;">
    </div>

    <div id="intellectual-quote" class="intel-container">
      <img id="quote-img" class="intel-img" src="autor.jpg" alt="Autor">
      <div class="intel-text">
        <span id="quote-content">"Cargando sabiduría..."</span>
      </div>
    </div>
  </div>

  <div class="wrap" id="mosaic">
    <div class="card"><h3>Noticia 1</h3></div>
    <div class="card"><h3>Noticia 2</h3></div>
  </div>

  <script>
    // Configura aquí tus frases y autores
    const quotes = [
      { text: "El mercado es un dispositivo para transferir dinero de los impacientes a los pacientes.", author: "Warren Buffett", img: "buffett.jpg" },
      { text: "La matemática es la música de la razón.", author: "James Joseph Sylvester", img: "sylvester.jpg" }
    ];

    function updateQuote() {
      // Cambia la frase según el día del año para que sea automática
      const day = new Date().getDate();
      const q = quotes[day % quotes.length];
      document.getElementById('quote-content').innerText = `"${q.text}" – ${q.author}`;
      document.getElementById('quote-img').src = q.img;
    }
    updateQuote();
  </script>
</body>
</html>
